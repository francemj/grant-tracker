<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Canadian Grant Finder{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
            maple: { 50: '#fef2f2', 100: '#fee2e2', 500: '#ef4444', 600: '#dc2626', 700: '#b91c1c' },
          }
        }
      }
    }
  </script>
  <style>
    .htmx-request { opacity: 0.6; transition: opacity 300ms; }
    .htmx-settling { opacity: 1; transition: opacity 300ms; }
    [x-cloak] { display: none !important; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="h-full bg-gray-50 text-gray-900 antialiased">
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <a href="/" class="flex items-center gap-2 font-bold text-xl text-brand-700">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
          Grant Finder
        </a>
        <div class="flex items-center gap-6">
          <a href="/grants" class="text-sm font-medium text-gray-600 hover:text-brand-700 transition-colors">Browse Grants</a>
          <a href="/discover" class="text-sm font-medium px-4 py-2 rounded-lg bg-brand-600 text-white hover:bg-brand-700 transition-colors">Find Grants For Me</a>
        </div>
      </div>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-white border-t border-gray-200 mt-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <p class="text-sm text-gray-500 text-center">
        Canadian Grant Finder &mdash; Aggregating federal funding opportunities for Canadian organizations.
        Data sourced from ESDC, CKAN Open Data, and Benefits Finder.
      </p>
    </div>
  </footer>
</body>
</html>
