# fly.toml app configuration file generated for grant-finder on 2026-03-23T20:53:23-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'grant-finder'
primary_region = 'yyz'

[build]

[env]
  GRANT_DB_PATH = '/data/grants.db'

[[mounts]]
  source = 'grants_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
  cpus = 1
  memory_mb = 1024
